name: Release – Android AAB

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & sign AAB
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks
          chmod 600 android/app/release.jks

      - name: Write key.properties
        run: |
          cat > android/app/key.properties <<EOF
          storeFile=release.jks
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: drivelogic-release-${{ github.ref_name }}
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      # Optional: publish to Play Store.
      # Uncomment and add the SERVICE_ACCOUNT_JSON secret to enable.
      #
